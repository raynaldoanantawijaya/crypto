name: Standalone Scraper (crypto)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Hunt Fresh Working Proxies
        run: python fetch_proxies.py

      - name: Run Scraper
        run: python menu.py --crypto
        
      - name: Commit & Push New JSON Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          
          # Ambil hasil JSON terbaru dari folder 
          latest_json=$(ls -t hasil_scrape/crypto/*.json | head -1 || true)
          if [ -n "$latest_json" ] && [ -f "$latest_json" ]; then
             echo "Updating endpoint with $latest_json"
             cp "$latest_json" "coinmarketcap_com_1773134697.json"
          else
             echo "Tidak ada file JSON baru dihasilkan."
          fi
          
          git add coinmarketcap_com_1773134697.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Auto-update crypto API endpoint" && git push)
